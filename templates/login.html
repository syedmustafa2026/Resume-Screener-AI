<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .password-wrapper {
            position: relative;
            width: 100%;
            display: block;
        }
        .password-wrapper input {
            width: 100%;
            padding-right: 45px !important;
            box-sizing: border-box;
        }
        .password-wrapper .toggle-eye {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            z-index: 999;
            font-size: 18px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="theme-switch">
        <span class="mode-label">Dark</span>
        <label class="switch">
            <input type="checkbox" id="themeToggle" onclick="toggleTheme()">
            <span class="slider"></span>
        </label>
        <span class="mode-label">Light</span>
    </div>

    <div class="container" style="width: 450px; margin-top: 80px;">
        <div class="logo">AI HR</div>
        <h1 style="font-size: 28px;">Admin Login</h1>
        
        <form action="/login" method="POST" style="margin-top: 20px;">
            <div style="margin-bottom: 15px;">
                <label for="username">Username:</label>
                <input type="text" name="username" id="username" placeholder="Enter admin username" required>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="password">Password:</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="Enter password" required>
                    <i class="fa-solid fa-eye-slash toggle-eye" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>

            <button type="submit">Login</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 14px;">← Back to Main Screen</a>
        </div>

        <footer>AI Resume Screening System</footer>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById("password");
            const eyeIcon = document.getElementById("togglePassword");
            
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                // FIXED: Jab text dikhega, tab normal khuli aankh (fa-eye) aayegi
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            } else {
                passwordInput.type = "password";
                // FIXED: Jab password chhupega, tab slash wali aankh (fa-eye-slash) aayegi
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            }
        }

        function toggleTheme() {
            let isLight = document.getElementById('themeToggle').checked;
            document.body.classList.toggle('light-mode', isLight);
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        window.onload = function() {
            if(localStorage.getItem('theme') === 'light') {
                document.getElementById('themeToggle').checked = true;
                document.body.classList.add('light-mode');
            }
        }
    </script>
</body>
</html>
